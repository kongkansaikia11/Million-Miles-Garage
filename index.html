            padding: 20px;
            line-height: 1.6;
        }
        
        /* h1 scales based on screen width (8% of width) but stays between 28px and 48px */
        h1 {
            text-align: center;
            font-size: clamp(28px, 8vw, 48px);
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 1.1rem; /* Slightly larger than default for readability */
            color: #555;
        }

        .phone-link {
            font-size: 26px; /* Increased for easy thumb-tapping */

            text-align: center;
            text-decoration: none;
            color: #007bff;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #007bff;
            border-radius: 8px; /* Makes it look like a clickable button */
        }
    </style>
</head>
